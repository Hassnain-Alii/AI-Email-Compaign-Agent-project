services:
  mongodb:
    image: mongo:6-jammy
    container_name: campaign_mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    networks:
      - mern_network

  redis:
    image: redis:7-alpine
    container_name: campaign_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - mern_network

  backend:
    build: 
      context: ./backend
      dockerfile: Dockerfile
    container_name: campaign_backend
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - MONGODB_URI=mongodb://mongodb:27017/ai-email-campaign
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - FRONTEND_URL=http://localhost:5173
    env_file:
      - ./backend/.env
    depends_on:
      - mongodb
      - redis
    networks:
      - mern_network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: campaign_frontend
    ports:
      - "5173:5173"
    environment:
      - VITE_API_BASE_URL=http://localhost:5000/api
    depends_on:
      - backend
    networks:
      - mern_network

volumes:
  mongodb_data:
  redis_data:

networks:
  mern_network:
    driver: bridge
